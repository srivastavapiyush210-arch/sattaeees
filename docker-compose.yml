version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sattaees_db
    environment:
      POSTGRES_DB: sattaees
      POSTGRES_USER: sattaees_user
      POSTGRES_PASSWORD: sattaees_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sattaees_user -d sattaees"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sattaees_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sattaees
      - SPRING_DATASOURCE_USERNAME=sattaees_user
      - SPRING_DATASOURCE_PASSWORD=sattaees_password
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080/api
    container_name: sattaees_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
